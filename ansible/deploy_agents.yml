---
- name: Hedef Makinelere Wazuh Agent Kurulumu (4.7.5 sabit, idempotent)
  hosts: target-caps, target-nfs, target-pam, target-systemd, target-ld
  become: yes
  tasks:
    - name: "1. Wazuh deposunu ve GPG anahtarini ekle"
      shell: |
        curl -s https://packages.wazuh.com/key/GPG-KEY-WAZUH | gpg --no-default-keyring --keyring gnupg-ring:/usr/share/keyrings/wazuh.gpg --import
        chmod 644 /usr/share/keyrings/wazuh.gpg
        echo "deb [signed-by=/usr/share/keyrings/wazuh.gpg] https://packages.wazuh.com/4.x/apt/ stable main" > /etc/apt/sources.list.d/wazuh.list
      args:
        creates: /etc/apt/sources.list.d/wazuh.list

    - name: "2. Wazuh Agent 4.7.5 kur (noninteractive + retry, dpkg takilmasi ve lock cozulur)"
      apt:
        name: wazuh-agent=4.7.5-1
        allow_downgrade: yes
        update_cache: yes
        dpkg_options: 'force-confnew'
      environment:
        DEBIAN_FRONTEND: noninteractive
      register: apt_result
      retries: 5
      delay: 15
      until: apt_result is succeeded

    - name: "3. Ajani durdur (config yazmadan once)"
      systemd:
        name: wazuh-agent
        state: stopped
      ignore_errors: yes

    - name: "4. Temiz ossec.conf yaz (MANAGER_IP placeholder sorununu cozer + syscheck)"
      copy:
        dest: /var/ossec/etc/ossec.conf
        owner: root
        group: wazuh
        mode: '0640'
        content: |
          <ossec_config>
            <client>
              <server>
                <address>192.168.56.20</address>
                <port>1514</port>
                <protocol>tcp</protocol>
              </server>
            </client>

            <localfile>
              <log_format>syslog</log_format>
              <location>/var/log/auth.log</location>
            </localfile>

            <localfile>
              <log_format>syslog</log_format>
              <location>/var/log/syslog</location>
            </localfile>

            <syscheck>
              <disabled>no</disabled>
              <directories check_all="yes" realtime="yes">/etc/pam.d,/etc/exports,/usr/local/bin,/etc/systemd/system,/etc/sudoers.d</directories>
              <frequency>300</frequency>
            </syscheck>
          </ossec_config>

    - name: "5. Eski key'i temizle"
      file:
        path: /var/ossec/etc/client.keys
        state: absent

    - name: "6. Ajani Manager'a kaydet (force blogu sayesinde duplicate olmaz, retry'li)"
      shell: /var/ossec/bin/agent-auth -m 192.168.56.20
      register: auth_result
      retries: 3
      delay: 5
      until: "'Valid key received' in auth_result.stderr"

    - name: "7. Ajan servisini baslat ve aktif et"
      systemd:
        name: wazuh-agent
        state: restarted
        enabled: yes