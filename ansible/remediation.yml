---
# 1. Muhammed: Linux Capabilities Sıkılaştırması (TAMAMLANDI)
- name: Target-Caps Makinesi için Dinamik Hardening
  hosts: target-caps
  become: yes
  tasks:
    - name: 1. Sadece 'cap_setuid' (root) yetkisi verilmis zararli dosyalari bul
      shell: "getcap -r /home 2>/dev/null | grep 'cap_setuid' | awk '{print $1}'"
      register: supheli_dosyalar
      changed_when: false

    - name: 2. Bulunan arka kapi dosyalarini sistemden kaldir
      file:
        path: "{{ item }}"
        state: absent
      loop: "{{ supheli_dosyalar.stdout_lines }}"
      when: supheli_dosyalar.stdout_lines | length > 0

    - name: 3. Kurban 'team2' kullanicisini ve ev dizinini temizle
      user:
        name: team2
        state: absent
        remove: yes

# 2. Bedirhan İhtiyar: NFS Misconfiguration & SUID Temizliği
- name: Target-NFS Makinesi için Hardening
  hosts: target-nfs
  become: yes
  tasks:
    - name: NFS zafiyetini kapat (no_root_squash bayrağını root_squash olarak değiştir)
      replace:
        path: /etc/exports
        regexp: 'no_root_squash'
        replace: 'root_squash'

    - name: NFS servisini yeniden başlatarak güvenli ayarları aktif et
      systemd:
        name: nfs-kernel-server
        state: restarted

    - name: SUID zafiyetini kapat (find komutunun yetkilerini varsayılana döndür)
      file:
        path: /usr/bin/find
        mode: '0755'

# 3. Emrihan: PAM Zafiyeti Sıkılaştırması
- name: Target-PAM Makinesi için Hardening
  hosts: target-pam
  become: yes
  vars:
    pam_dosyalari:
      - /etc/pam.d/common-auth
      - /etc/pam.d/common-account
      - /etc/pam.d/common-password
      - /etc/pam.d/common-session
      - /etc/pam.d/sshd
      - /etc/pam.d/sudo
      - /etc/pam.d/login
      - /etc/pam.d/su

    # Bir PAM satırında görülmesi şüpheli olan pattern'lar
    # pam_permit   → kimlik doğrulamayı tamamen atlar
    # pam_exec     → dış script çağırır (backdoor vektörü)
    # pam_succeed_if + nopasswd_users → şifresiz grup tanımı
    # nullok       → boş şifreye izin verir (sufficient ile birleşince tehlikeli)
    zarali_pattern: >-
      (pam_permit\.so|
       pam_exec\.so.*(/tmp|/var/tmp|/dev/shm|/usr/local/bin)|
       pam_succeed_if\.so.*nopasswd|
       auth\s+sufficient\s+pam_unix\.so\s+nullok)

  tasks:

    # ── BÖLÜM A: Spesifik Temizlik (bizim scriptimizin izleri) ──────────

    - name: "PAM A1 | common-auth: pam_exec backdoor satırını kaldır"
      lineinfile:
        path: /etc/pam.d/common-auth
        regexp: '.*pam_exec\.so.*pam_backdoor\.sh.*'
        state: absent

    - name: "PAM A2 | Backdoor script dosyasını sil"
      file:
        path: /usr/local/bin/pam_backdoor.sh
        state: absent

    - name: "PAM A3 | sudo PAM: pam_permit bypass satırını kaldır"
      lineinfile:
        path: /etc/pam.d/sudo
        regexp: '.*auth\s+sufficient\s+pam_permit\.so.*'
        state: absent

    - name: "PAM A4 | common-auth: nullok sufficient satırını kaldır"
      lineinfile:
        path: /etc/pam.d/common-auth
        regexp: '.*auth\s+sufficient\s+pam_unix\.so\s+nullok.*'
        state: absent

    - name: "PAM A5 | Backdoor kullanıcısını kaldır"
      user:
        name: backdooruser
        state: absent
        remove: yes
      ignore_errors: yes

    # ── BÖLÜM B: Genel Tarama — Bilinmeyen Zararlıları Bul ─────────────

    - name: "PAM B1 | Tüm PAM dosyalarını şüpheli pattern'lar için tara"
      shell: >
        grep -En "{{ zarali_pattern }}" {{ item }} 2>/dev/null || true
      loop: "{{ pam_dosyalari }}"
      register: pam_tarama
      changed_when: false

    - name: "PAM B2 | Tarama sonuçlarını raporla"
      debug:
        msg: "{{ item.item }}: {{ item.stdout_lines }}"
      loop: "{{ pam_tarama.results }}"
      when: item.stdout_lines | length > 0

    - name: "PAM B3 | /tmp /var/tmp /dev/shm altında pam_exec ile çağrılan scriptleri bul"
      shell: >
        grep -rEh 'pam_exec\.so.+(/tmp|/var/tmp|/dev/shm)' /etc/pam.d/ 2>/dev/null
        | grep -oP '(/tmp|/var/tmp|/dev/shm)\S+' || true
      register: gecici_scriptler
      changed_when: false

    - name: "PAM B4 | Geçici dizinlerdeki zararlı scriptleri sil"
      file:
        path: "{{ item }}"
        state: absent
      loop: "{{ gecici_scriptler.stdout_lines }}"
      when: gecici_scriptler.stdout_lines | length > 0

    - name: "PAM B5 | Şüpheli pam_exec satırlarını tüm PAM dosyalarından kaldır"
      replace:
        path: "{{ item }}"
        regexp: '^.*pam_exec\.so.*(\/tmp|\/var\/tmp|\/dev\/shm|\/usr\/local\/bin).*$'
        replace: '# [KALDIRILDI - Ansible PAM Hardening]'
      loop: "{{ pam_dosyalari }}"
      ignore_errors: yes

    - name: "PAM B6 | Şifresiz gruplara izin veren pam_succeed_if satırlarını kaldır"
      replace:
        path: "{{ item }}"
        regexp: '^.*pam_succeed_if\.so.*nopasswd.*$'
        replace: '# [KALDIRILDI - Ansible PAM Hardening]'
      loop: "{{ pam_dosyalari }}"
      ignore_errors: yes

    # ── BÖLÜM C: SSH Sıkılaştırma ──────────────────────────────────────

    - name: "PAM C1 | SSH: PermitEmptyPasswords kapat"
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitEmptyPasswords'
        line: 'PermitEmptyPasswords no'

    - name: "PAM C2 | SSH: UsePAM aktif bırak (doğru — PAM üzerinden kontrol)"
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?UsePAM'
        line: 'UsePAM yes'

    - name: "PAM C3 | SSH servisini yeniden başlat"
      service:
        name: sshd
        state: restarted

    # ── BÖLÜM D: Son Doğrulama ─────────────────────────────────────────

    - name: "PAM D1 | Doğrulama: common-auth'da backdoor izi kalmadı mı?"
      shell: "grep -cE 'pam_backdoor|pam_permit' /etc/pam.d/common-auth || true"
      register: pam_kontrol
      changed_when: false
      failed_when: pam_kontrol.stdout | int > 0

    - name: "PAM D2 | Doğrulama: sudo PAM temiz mi?"
      shell: "grep -cE 'pam_permit' /etc/pam.d/sudo || true"
      register: sudo_kontrol
      changed_when: false
      failed_when: sudo_kontrol.stdout | int > 0

    - name: "PAM D3 | Sonuç raporu"
      debug:
        msg:
          - "common-auth kontrolü: {{ 'TEMİZ ✓' if pam_kontrol.stdout | int == 0 else 'SORUN VAR ✗' }}"
          - "sudo PAM kontrolü  : {{ 'TEMİZ ✓' if sudo_kontrol.stdout | int == 0 else 'SORUN VAR ✗' }}"

# 4. Ahmet Faruk: Systemd Sıkılaştırması
- name: Systemd Makinesi için Hardening
  hosts: vuln-systemd
  become: yes
  tasks:

    - name: Zafiyetli (World-Writable ExecStart) systemd servislerini dinamik olarak tespit et
      shell: |
        for svc in /etc/systemd/system/*.service; do
          if [ -f "$svc" ]; then
            # ExecStart ile tetiklenen ana betiğin yolunu al
            exec_bin=$(grep -E '^\s*ExecStart=' "$svc" | cut -d'=' -f2- | awk '{print $1}')
            
            # Betik mevcutsa ve herkes tarafından yazılabilir durumdaysa (777 vb.)
            if [ -n "$exec_bin" ] && [ -e "$exec_bin" ]; then
              if [ -n "$(find "$exec_bin" -perm -0002 2>/dev/null)" ]; then
                # Servis adını ve zafiyetli scriptin yolunu output olarak ver
                echo "${svc##*/}|$exec_bin"
              fi
            fi
          fi
        done
      register: detected_services
      changed_when: false

    - name: Zafiyetli systemd servislerini durdur ve devre dışı bırak
      systemd:
        name: "{{ item.split('|')[0] }}"
        state: stopped
        enabled: no
      with_items: "{{ detected_services.stdout_lines }}"
      when: detected_services.stdout_lines | length > 0

    - name: Zafiyetli systemd timer'larını durdur (varsa)
      systemd:
        name: "{{ item.split('|')[0] | replace('.service', '.timer') }}"
        state: stopped
        enabled: no
      with_items: "{{ detected_services.stdout_lines }}"
      when: detected_services.stdout_lines | length > 0
      failed_when: false

    - name: Zafiyetli servisin tetiklediği harici scripti sil
      file:
        path: "{{ item.split('|')[1] }}"
        state: absent
      with_items: "{{ detected_services.stdout_lines }}"
      when: detected_services.stdout_lines | length > 0

    - name: Zafiyetli systemd service dosyalarını sil
      file:
        path: "/etc/systemd/system/{{ item.split('|')[0] }}"
        state: absent
      with_items: "{{ detected_services.stdout_lines }}"
      when: detected_services.stdout_lines | length > 0
      notify: Daemon Reload

    - name: Zafiyetli systemd timer dosyalarını sil
      file:
        path: "/etc/systemd/system/{{ item.split('|')[0] | replace('.service', '.timer') }}"
        state: absent
      with_items: "{{ detected_services.stdout_lines }}"
      when: detected_services.stdout_lines | length > 0
      notify: Daemon Reload

    # KULLANICI VE EV DİZİNİ TEMİZLİĞİ
    - name: Zafiyet testleri için açılan kullanıcıları ve ev dizinlerini tamamen sil
      user:
        name: systemd_user
        state: absent
        remove: yes  # Kullanıcının ev dizinini (/home/...) ve tüm dosyalarını siler
        force: yes   # Kullanıcı arka planda açık bir session bıraktıysa bile zorla siler
      failed_when: false # Kullanıcı zaten silinmişse hatayı önler

  # HANDLERS
  handlers:
    - name: Daemon Reload
      systemd:
        daemon_reload: yes


# 5. Ahmet Faruk: LD_PRELOAD ve Sudoers Zafiyet Temizliği
- name: LD Makinesi için Hardening
  hosts: vuln-ld
  become: yes
  tasks:

    - name: Sudoers (.d) dizinindeki tüm konfigürasyon dosyalarını bul
      find:
        paths: /etc/sudoers.d
        file_type: file
      register: sudoers_files

    - name: Sudoers içerisindeki LD_PRELOAD (env_keep) zafiyetlerini pasifize et
      replace:
        path: "{{ item.path }}"
        regexp: '^(.*env_keep\s*\+=\s*LD_PRELOAD.*)$'
        replace: '# \1 # ANSIBLE: GUVENLIK SEBEBIYLE KAPATILDI'
      with_items:
        - { path: '/etc/sudoers' }
        - "{{ sudoers_files.files }}"
      validate: /usr/sbin/visudo -cf %s

    - name: Sudoers içindeki uptime komut yetkilerini kapat
      replace:
        path: "{{ item.path }}"
        # İçinde /usr/bin/uptime geçen tüm aktif satırları yakalar
        regexp: '^([^#]*\/usr\/bin\/uptime.*)$'
        replace: '# \1 # ANSIBLE: GUVENLIK SEBEBIYLE KAPATILDI'
      with_items:
        - { path: '/etc/sudoers' }
        - "{{ sudoers_files.files }}"
      validate: /usr/sbin/visudo -cf %s

    # KULLANICI VE EV DİZİNİ TEMİZLİĞİ
    - name: Zafiyet testleri için açılan kullanıcıları ve ev dizinlerini tamamen sil
      user:
        name: ld_user
        state: absent
        remove: yes  # Kullanıcının ev dizinini (/home/...) ve tüm dosyalarını siler
        force: yes   # Kullanıcı arka planda açık bir session bıraktıysa bile zorla siler
      failed_when: false # Kullanıcı zaten silinmişse hatayı önler